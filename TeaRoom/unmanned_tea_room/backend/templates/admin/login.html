{% extends "admin/base.html" %}

{% block login_content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-building" style="font-size: 48px; color: #667eea;"></i>
                    <h3 class="mt-3">无人茶室管理系统</h3>
                    <p class="text-muted">管理员登录</p>
                </div>
                
                <form method="POST" action="/admin/login">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <label for="password" class="form-label">密码</label>
                            <a href="/admin/forgot-password" class="text-decoration-none small">忘记密码？</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        登录
                    </button>
                    
                    <div class="text-center">
                        <small class="text-muted">
                            默认账号：admin / admin123
                        </small>
                    </div>
                    
                    <hr class="my-3">
                    
                    <div class="text-center">
                        <small class="text-muted">
                            <a href="/user/login" class="text-decoration-none">用户登录</a> | 
                            <a href="/user/register" class="text-decoration-none">用户注册</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
