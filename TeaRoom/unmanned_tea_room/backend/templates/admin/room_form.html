{% extends "admin/base.html" %}

{% block title %}{{ '编辑' if room else '添加' }}房间 - 无人茶室管理系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ '编辑' if room else '添加' }}房间</h2>
    <a href="{{ url_for('admin.rooms') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
        返回列表
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">房间名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" 
                           value="{{ room.name if room else '' }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="price_per_hour" class="form-label">价格/小时（元） <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="price_per_hour" name="price_per_hour" 
                           value="{{ room.price_per_hour if room else '' }}" step="0.01" min="0" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">房间描述</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ room.description if room else '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label for="image_url" class="form-label">图片URL</label>
                <input type="url" class="form-control" id="image_url" name="image_url" 
                       value="{{ room.image_url if room else '' }}" placeholder="https://example.com/image.jpg">
            </div>
            
            <div class="mb-3">
                <label for="facilities" class="form-label">设施（用逗号分隔）</label>
                <input type="text" class="form-control" id="facilities" name="facilities" 
                       value="{{ room.facilities|join(', ') if room.facilities else '' }}" 
                       placeholder="例如：WiFi,空调,茶具,电视">
            </div>
            
            <div class="mb-4">
                <label class="form-label">状态 <span class="text-danger">*</span></label>
                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="available" 
                               value="available" {% if not room or room.status == 'available' %}checked{% endif %}>
                        <label class="form-check-label" for="available">
                            可预约
                        </label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="occupied" 
                               value="occupied" {% if room and room.status == 'occupied' %}checked{% endif %}>
                        <label class="form-check-label" for="occupied">
                            已占用
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i>
                    {{ '保存修改' if room else '添加房间' }}
                </button>
                <a href="{{ url_for('admin.rooms') }}" class="btn btn-outline-secondary">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>

{% if room and room.image_url %}
<div class="card mt-4">
    <div class="card-body">
        <h5 class="card-title">当前图片</h5>
        <img src="{{ room.image_url }}" alt="房间图片" class="img-fluid rounded" style="max-height: 300px;">
    </div>
</div>
{% endif %}
{% endblock %}
