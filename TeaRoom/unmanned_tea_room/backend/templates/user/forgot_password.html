{% extends "admin/base.html" %}

{% block title %}忘记密码 - 无人茶室管理系统{% endblock %}

{% block login_content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-key" style="font-size: 48px; color: #667eea;"></i>
                    <h3 class="mt-3">忘记密码</h3>
                    <p class="text-muted">输入您的手机号重置密码</p>
                </div>
                
                <form method="POST" action="/user/forgot-password">
                    <div class="mb-3">
                        <label for="phone" class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-phone"></i>
                            </span>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入注册手机号" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="verification_code" class="form-label">验证码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-shield-check"></i>
                            </span>
                            <input type="text" class="form-control" id="verification_code" name="verification_code" placeholder="请输入验证码" required>
                            <button type="button" class="btn btn-outline-secondary" id="sendCodeBtn" onclick="sendVerificationCode()">获取验证码</button>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="new_password" class="form-label">新密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="new_password" name="new_password" placeholder="请输入新密码" required>
                        </div>
                        <div class="form-text">密码长度5-20位，需包含大小写字母和数字</div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">确认新密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        重置密码
                    </button>
                    
                    <div class="text-center">
                        <small class="text-muted">
                            <a href="/user/login" class="text-decoration-none">返回登录</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// 发送验证码
function sendVerificationCode() {
    const phone = document.getElementById('phone').value;
    const btn = document.getElementById('sendCodeBtn');
    
    if (!phone) {
        alert('请先输入手机号');
        return;
    }
    
    if (!/^1[3-9]\d{9}$/.test(phone)) {
        alert('请输入有效的11位手机号');
        return;
    }
    
    // 模拟发送验证码
    btn.disabled = true;
    btn.textContent = '发送中...';
    
    fetch('/api/users/verification-code', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ phone: phone })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('验证码已发送');
            // 倒计时
            let count = 60;
            btn.textContent = count + '秒后重试';
            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                } else {
                    btn.textContent = count + '秒后重试';
                }
            }, 1000);
        } else {
            alert(data.message || '发送失败');
            btn.disabled = false;
            btn.textContent = '获取验证码';
        }
    })
    .catch(error => {
        alert('网络错误，请稍后重试');
        btn.disabled = false;
        btn.textContent = '获取验证码';
    });
}

// 表单验证
document.querySelector('form').addEventListener('submit', function(e) {
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (newPassword !== confirmPassword) {
        e.preventDefault();
        alert('两次输入的密码不一致');
        return false;
    }
    
    if (newPassword.length < 5 || newPassword.length > 20) {
        e.preventDefault();
        alert('密码长度必须在5-20位之间');
        return false;
    }
    
    if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(newPassword)) {
        e.preventDefault();
        alert('密码必须包含大小写字母和数字');
        return false;
    }
});
</script>
{% endblock %}
