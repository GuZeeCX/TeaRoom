{% extends "admin/base.html" %}

{% block title %}用户注册 - 无人茶室管理系统{% endblock %}

{% block login_content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus" style="font-size: 48px; color: #667eea;"></i>
                    <h3 class="mt-3">用户注册</h3>
                    <p class="text-muted">创建您的账号</p>
                </div>
                
                <form method="POST" action="/user/register" id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form-text text-muted">可以是字母、中文、数字或组合，3-20个字符</div>
                        <div class="invalid-feedback" id="username-error"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="real_name" class="form-label">真实姓名</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-badge"></i>
                            </span>
                            <input type="text" class="form-control" id="real_name" name="real_name" required>
                        </div>
                        <div class="form-text text-muted">必须是中文，1-20个字符</div>
                        <div class="invalid-feedback" id="real_name-error"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-phone"></i>
                            </span>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>
                        <div class="form-text text-muted">请输入真实的11位手机号</div>
                        <div class="invalid-feedback" id="phone-error"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱（可选）</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        <div class="form-text text-muted">请输入有效的邮箱地址</div>
                        <div class="invalid-feedback" id="email-error"></div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="form-text text-muted">包含大小写字母和数字，5-20个字符</div>
                        <div class="invalid-feedback" id="password-error"></div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                        <div class="form-text text-muted">请再次输入密码</div>
                        <div class="invalid-feedback" id="confirm_password-error"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3" id="submitBtn">
                        注册
                    </button>
                    
                    <div class="text-center">
                        <small class="text-muted">
                            已有账号？<a href="/user/login">立即登录</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.invalid-feedback {
    display: none;
    color: #dc3545;
    font-size: 0.875rem;
    margin-top: 0.25rem;
}

.invalid-feedback.show {
    display: block;
}

.form-control.is-invalid {
    border-color: #dc3545;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12' fill='none' stroke='%23dc3545'%3e%3ccircle cx='6' cy='6' r='4.5'/%3e%3cpath stroke-linejoin='round' d='M5.8 3.6h.4L6 6.5zM6 8.2a.3.3 0 000 .6h-.4a.3.3 0 000-.6h.4z'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right calc(0.375em + 0.1875rem) center;
    background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
}

.form-control.is-valid {
    border-color: #198754;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3e%3cpath fill='%23198754' d='M2.3 6.73L.6 4.53c-.4-1.04.46-1.4 1.1-.8l1.1 1.4 3.4-3.8c.6-.63 1.6-.27 1.2.7l-4 4.6c-.43.5-.8.4-1.1.1z'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right calc(0.375em + 0.1875rem) center;
    background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    
    // 验证规则
    const validators = {
        username: {
            validate: function(value) {
                if (!value) return '用户名不能为空';
                if (value.length < 3 || value.length > 20) return '用户名长度必须在3-20个字符之间';
                if (!/^[\u4e00-\u9fa5a-zA-Z0-9]+$/.test(value)) return '用户名只能包含中文、字母和数字';
                return null;
            }
        },
        real_name: {
            validate: function(value) {
                if (!value) return '真实姓名不能为空';
                if (value.length < 1 || value.length > 20) return '真实姓名长度必须在1-20个字符之间';
                if (!/^[\u4e00-\u9fa5]+$/.test(value)) return '真实姓名必须为中文';
                return null;
            }
        },
        phone: {
            validate: function(value) {
                if (!value) return '手机号不能为空';
                if (!/^1[3-9]\d{9}$/.test(value)) return '请输入有效的11位手机号';
                return null;
            }
        },
        email: {
            validate: function(value) {
                if (!value) return null; // 邮箱是可选的
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return '请输入有效的邮箱地址';
                return null;
            }
        },
        password: {
            validate: function(value) {
                if (!value) return '密码不能为空';
                if (value.length < 5 || value.length > 20) return '密码长度必须在5-20个字符之间';
                if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(value)) return '密码必须包含大小写字母和数字';
                return null;
            }
        },
        confirm_password: {
            validate: function(value) {
                const password = document.getElementById('password').value;
                if (!value) return '请确认密码';
                if (value !== password) return '两次输入的密码不一致';
                return null;
            }
        }
    };
    
    // 显示错误信息
    function showError(fieldId, message) {
        const input = document.getElementById(fieldId);
        const errorDiv = document.getElementById(fieldId + '-error');
        
        if (message) {
            input.classList.add('is-invalid');
            input.classList.remove('is-valid');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        } else {
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            errorDiv.classList.remove('show');
        }
    }
    
    // 实时验证
    function validateField(fieldId) {
        const input = document.getElementById(fieldId);
        const value = input.value.trim();
        const validator = validators[fieldId];
        
        if (validator) {
            const error = validator.validate(value);
            showError(fieldId, error);
            return !error;
        }
        return true;
    }
    
    // 为每个输入框添加实时验证
    Object.keys(validators).forEach(fieldId => {
        const input = document.getElementById(fieldId);
        if (input) {
            input.addEventListener('blur', function() {
                validateField(fieldId);
            });
            
            input.addEventListener('input', function() {
                // 输入时移除错误状态
                const errorDiv = document.getElementById(fieldId + '-error');
                if (errorDiv.classList.contains('show')) {
                    validateField(fieldId);
                }
            });
        }
    });
    
    // 表单提交验证
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        let isValid = true;
        Object.keys(validators).forEach(fieldId => {
            if (!validateField(fieldId)) {
                isValid = false;
            }
        });
        
        if (isValid) {
            // 验证通过，提交表单
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            form.submit();
        }
    });
});
</script>
{% endblock %}
