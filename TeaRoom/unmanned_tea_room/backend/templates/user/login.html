{% extends "admin/base.html" %}

{% block title %}用户登录 - 无人茶室管理系统{% endblock %}

{% block login_content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person" style="font-size: 48px; color: #667eea;"></i>
                    <h3 class="mt-3">用户登录</h3>
                    <p class="text-muted">欢迎回来</p>
                </div>
                
                <form method="POST" action="/user/login">
                    <div class="mb-3">
                        <label for="identifier" class="form-label">用户名/手机号</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="identifier" name="identifier" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">记住我</label>
                        </div>
                        <a href="/user/forgot-password" class="text-decoration-none small">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        登录
                    </button>
                    
                    <div class="text-center">
                        <small class="text-muted">
                            还没有账号？<a href="/user/register">立即注册</a>
                        </small>
                    </div>
                    
                    <hr class="my-3">
                    
                    <div class="text-center">
                        <small class="text-muted">
                            <a href="/admin/login" class="text-decoration-none">管理员登录</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
